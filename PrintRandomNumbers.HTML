<!DOCTYPE html>
<html>
<body>

<h2>Random Numbers:</h2>
<div id="demo"></div>

<script>
    let count = 0;
    let output = "";

    while (count < 1) {
        let randomNum = Math.floor(Math.random() * 100) + 1;
        output += randomNum + "<br>";
        count++;
    }

    document.getElementById("demo").innerHTML = output;
</script>

</body>
</html>

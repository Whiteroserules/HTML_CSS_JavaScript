<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>Smth</h2>
        <p></p>

        <p id="sibling1"></p>
        <p id="sibling2"></p>

        <script>
            class sibling {
                constructor(name, year) {
                    this.name = name;
                    this.year = year;
                }

                age() {
                    let date = new Date();
                    return date.getFullYear() - this.year;
                }
            }

         const sibling1 = new sibling ("Orlando", 2011);
            document.getElementById("sibling1").innerHTML = "My brother's name is " + sibling1.name + " And he was born in " + sibling1.year + " making him " + sibling1.age() + " years old";
         const sibling2 = new sibling ("Skyler", 2014);
            document.getElementById("sibling2").innerHTML = "My Other brother's name is " + sibling2.name + " And he was born in " + sibling2.year + " making him " + sibling2.age() + " years old";
            
        </script>
    </body>
</html>

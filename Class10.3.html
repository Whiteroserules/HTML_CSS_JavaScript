<!DOCTYPE html>
<html>
    <head></head>
    <body>

        <h2></h2>

        <button onclick="myFunction()">Try It</button>

        <p id="result"></p>

        <script>
            function myFunction() {
                var x = 10;
                var y = 20;

                var a = eval(x + y) + "<br>";
                var b = eval(2 * 2) + "<br>";
                var c = eval(y - x) + "<br>";

                var res = a + b + c; //cancatenates the string

                document.getElementById("result").innerHTML = res;
            }
        </script>
    </body>
</html>
